<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b5ed7">
<title>ニュースまとめ</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#f3f5f8; --card:#fff; --fg:#1c2330; --muted:#6e747c; --line:#e4e7ec;
    --accent:#0b5ed7; --accentbg:#ebf3ff; --new:#ca4040; --chip:#eef1f5;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#11151c; --card:#1a212c; --fg:#e7ecf3; --muted:#9aa4b2; --line:#2a3340;
      --accent:#5b9dff; --accentbg:#16243a; --new:#e06464; --chip:#222b38; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,'Segoe UI','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
    line-height:1.6;-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:10;background:var(--accent);color:#fff;
    padding:max(12px,env(safe-area-inset-top)) 16px 12px;box-shadow:0 1px 6px rgba(0,0,0,.15)}
  .htop{display:flex;align-items:center;gap:10px}
  header h1{font-size:1.15rem;margin:0;flex:1;font-weight:700}
  header .date{font-size:.8rem;opacity:.9;margin-top:2px}
  button{font:inherit;color:inherit;background:rgba(255,255,255,.18);border:0;border-radius:8px;
    padding:7px 12px;cursor:pointer}
  button:active{transform:scale(.96)}
  select{font:inherit;border:0;border-radius:8px;padding:7px 10px;background:rgba(255,255,255,.18);color:#fff}
  select option{color:#000}
  main{max-width:760px;margin:0 auto;padding:14px 12px 40px}
  .box{background:var(--accentbg);border-radius:12px;padding:14px 16px;margin:6px 0 18px}
  .box b{color:var(--accent)}
  .theme{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .theme h2{margin:0 0 6px;font-size:1.05rem;display:flex;align-items:center;gap:8px}
  .theme h2 .bar{width:4px;height:18px;border-radius:2px;background:var(--accent)}
  .chip{font-size:.72rem;color:var(--muted);background:var(--chip);border-radius:999px;padding:2px 9px}
  .overview{color:var(--fg);margin:.3em 0 .7em;font-size:.95rem}
  .hl{padding:11px 0;border-top:1px solid var(--line)}
  .hl:first-of-type{border-top:0}
  .hl .head{font-weight:600;font-size:.98rem}
  .hl a{color:var(--accent);text-decoration:none}
  .hl .new{background:var(--new);color:#fff;font-size:.65rem;font-weight:700;
    padding:1px 6px;border-radius:5px;margin-right:6px;vertical-align:middle}
  .hl .src{font-size:.78rem;color:var(--muted);margin-top:2px}
  .hl .why{font-size:.88rem;color:var(--muted);margin-top:3px}
  .status{text-align:center;color:var(--muted);padding:40px 16px;font-size:.95rem}
  .foot{text-align:center;color:var(--muted);font-size:.75rem;margin-top:18px}
  .offline{background:#8a6d3b;color:#fff;text-align:center;font-size:.78rem;padding:5px}
  .offline[hidden]{display:none}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>ニュースまとめ</h1>
    <select id="archive" aria-label="過去のまとめ" hidden></select>
    <button id="refresh" aria-label="更新">↻ 更新</button>
  </div>
  <div class="date" id="date"></div>
</header>
<div class="offline" id="offline" hidden>オフライン表示中（前回取得分）</div>
<main id="main"><div class="status" id="status">読み込み中…</div></main>

<script>
const $ = (id) => document.getElementById(id);

function el(tag, cls, text){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;   // textContent => model text can't inject HTML
  return n;
}

function render(d){
  $("date").textContent = [d.date, d.status_line].filter(Boolean).join("　・　");
  const main = $("main"); main.textContent = "";
  if (d.exec_summary){
    const box = el("div","box");
    box.appendChild(el("b", null, "今日の注目"));
    box.appendChild(el("div", null, d.exec_summary));
    main.appendChild(box);
  }
  (d.themes || []).forEach(t => {
    const sec = el("section","theme");
    const h2 = el("h2");
    h2.appendChild(el("span","bar"));
    h2.appendChild(document.createTextNode(t.theme));
    if (t.status_label) h2.appendChild(el("span","chip", t.status_label));
    sec.appendChild(h2);
    if (t.overview) sec.appendChild(el("div","overview", t.overview));
    if (t.error) sec.appendChild(el("div","src", "取得失敗: " + t.error));
    (t.highlights || []).forEach(h => {
      const hl = el("div","hl");
      const head = el("div","head");
      if (h.is_new){ head.appendChild(el("span","new","新着")); }
      if (h.link){
        const a = el("a", null, h.headline);
        a.href = h.link; a.target = "_blank"; a.rel = "noopener noreferrer";
        head.appendChild(a);
      } else {
        head.appendChild(document.createTextNode(h.headline));
      }
      hl.appendChild(head);
      const cov = h.sources_count >= 2 ? "　他" + (h.sources_count - 1) + "媒体" : "";
      if (h.source || cov) hl.appendChild(el("div","src", "出典: " + h.source + cov));
      if (h.why) hl.appendChild(el("div","why", h.why));
      sec.appendChild(hl);
    });
    main.appendChild(sec);
  });
  const foot = el("div","foot", (d.generated || "") + "　— このPCで生成");
  main.appendChild(foot);
}

async function loadJSON(url){
  const r = await fetch(url, {cache: "no-store"});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function load(url){
  $("offline").hidden = true;
  try{
    const d = await loadJSON(url + "?t=" + Date.now());
    render(d);
    if (url === "today.json") localStorage.setItem("nd_last", JSON.stringify(d));
  }catch(e){
    if (url === "today.json"){     // offline / PC unreachable: show last fetched
      const c = localStorage.getItem("nd_last");
      if (c){ render(JSON.parse(c)); $("offline").hidden = false; return; }
    }
    $("main").textContent = "";
    $("main").appendChild(el("div","status",
      "まだデータがありません。PCで生成すると、ここに今朝のまとめが表示されます。"));
  }
}

async function initArchive(){
  try{
    const list = await loadJSON("archive/index.json?t=" + Date.now());
    if (!Array.isArray(list) || list.length < 2) return;
    const sel = $("archive");
    list.forEach((it, i) => {
      const o = document.createElement("option");
      o.value = i === 0 ? "today.json" : "archive/" + it.file;
      o.textContent = it.date + (i === 0 ? "（最新）" : "");
      sel.appendChild(o);
    });
    sel.hidden = false;
    sel.addEventListener("change", () => load(sel.value));
  }catch(_){ /* archive optional */ }
}

$("refresh").addEventListener("click", () => {
  const sel = $("archive");
  load(sel.hidden ? "today.json" : sel.value);
});

load("today.json");
initArchive();
if ("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
